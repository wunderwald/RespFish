<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RespFish</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&display=swap" rel="stylesheet" />

  <!-- Base shell styles — always loaded -->
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/stream.css" />

  <!-- Frontend stylesheet is injected dynamically by renderer.js -->
  <link rel="stylesheet" href="styles/gaze.css" />

  <!--
    WebGazer — webcam-based gaze estimation.
    Loaded as a plain script (not a module) because WebGazer uses a UMD build
    and attaches itself to window.webgazer.
    The local copy lives at lib/webgazer.js — download once with:
      curl -L https://cdn.jsdelivr.net/npm/webgazer@3.0.1/dist/webgazer.min.js \
           -o electron/lib/webgazer.js
    To use the CDN directly during development, swap the src below to:
      https://cdn.jsdelivr.net/npm/webgazer@3.0.1/dist/webgazer.min.js
  -->
  <script src="lib/webgazer.js" defer></script>
</head>
<body>
  <!-- mount containers — modules inject their DOM here -->
  <div id="stream-bar"></div>
  <div id="stats"></div>
  <div id="scene"></div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
