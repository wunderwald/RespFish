<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Experimenter Controls</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/stream.css" />
  <link rel="stylesheet" href="styles/ibreath.css" />
  <style>body { background: #000; }</style>
</head>
<body>
  <div id="top-bars">
    <div id="stream-bar"></div>
    <div id="gaze-bar"></div>
    <div id="timer-bar">
      <span id="ib-state-text">waiting for stream…</span>
      <span id="ib-clock">
        <span class="label">elapsed</span>
        <span id="ib-elapsed">—</span>
        <span class="clock-sep"> / </span>
        <span class="label">left</span>
        <span id="ib-remaining">—</span>
      </span>
    </div>
  </div>
  <div id="settings-bar"></div>
  <div id="stats"></div>
  <div id="log-bar"></div>
  <script type="module" src="experimenter.js"></script>
</body>
</html>
