<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RespFish</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      font-weight: 300;
      background: #0f485f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }

    /* ── stream selector ───────────────────────────────────────────────── */
    #stream-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(150, 150, 150, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 99px;
      padding: 8px 20px;
      font-size: 0.78rem;
      color: #aed4ed;
      letter-spacing: 0.04em;
    }
    #stream-bar .label { opacity: 0.6; }

    #stream-select {
      background: transparent;
      border: none;
      color: #aed4ed;
      font-family: 'Nunito', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      outline: none;
      min-width: 140px;
    }
    #stream-select option {
      background: #0f485f;
      color: #aed4ed;
    }
    #stream-select option[data-offline="true"] {
      color: #e07878;
    }

    /* ── stats bar ─────────────────────────────────────────────────────── */
    #stats {
      display: flex;
      gap: 24px;
      background: rgba(150, 150, 150, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 99px;
      padding: 8px 24px;
      font-size: 0.78rem;
      color: #aed4ed;
      letter-spacing: 0.04em;
    }
    #stats span { white-space: nowrap; }
    #stats .label { opacity: 0.6; margin-right: 4px; }
    #status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #b0cfe0;
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.4s;
    }
    #status-dot.connected    { background: #5bc98a; }
    #status-dot.disconnected { background: #e07878; }
    #status-dot.searching    { background: #f0c060;
      animation: pulse 1.2s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── scene container ───────────────────────────────────────────────── */
    #scene {
      position: relative;
      width: 90vw;
      height: 80vh;
      border-radius: 28px;
      overflow: hidden;

      background: linear-gradient(
        180deg,
        #b8e4f7 0%,
        #8dcfef 40%,
        #6bbde8 100%
      );
      box-shadow:
        0 8px 32px rgba(80,160,210,0.18),
        inset 0 1px 0 rgba(255,255,255,0.5);
    }

    /* subtle caustic shimmer overlay */
    #scene::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 30% 20%,
          rgba(255,255,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 70% 60%,
          rgba(255,255,255,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── wave canvas ───────────────────────────────────────────────────── */
    #wave {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }

    /* ── fish ──────────────────────────────────────────────────────────── */
    #fish {
      position: absolute;
      left: 66.66%;
      transform: translateX(-50%) translateY(-50%);
      width: clamp(100px, 20vw, 200px);
      z-index: 3;
      top: var(--fish-y, 50%);
      filter: drop-shadow(0 4px 10px rgba(0,100,160,0.2));
    }

    @keyframes wag {
      0%, 100% { transform: translateX(-50%) rotate(-2deg); }
      50%       { transform: translateX(-50%) rotate( 2deg); }
    }
  </style>
</head>
<body>

  <div id="stream-bar">
    <span class="label">stream</span>
    <select id="stream-select">
      <option value="" disabled selected>no streams found</option>
    </select>
  </div>

  <div id="stats">
    <span><span id="status-dot"></span><span id="status-text">connecting…</span></span>
    <span><span class="label">value</span><span id="val">—</span></span>
    <span><span class="label">samples/s</span><span id="sps">—</span></span>
  </div>

  <div id="scene">
    <canvas id="wave"></canvas>
    <img id="fish" src="fishy.png" alt="fish" />
  </div>

  <script>
    const WS_URL      = "ws://localhost:8765";
    const HISTORY_LEN = 300;
    const PADDING     = 0.08;

    const history = new Float32Array(HISTORY_LEN);
    let   histIdx = 0;
    let   sampleCount = 0;

    // slow-adapting range — expands instantly, shrinks at SHRINK_RATE per frame
    const SHRINK_RATE = 0.0002;
    let   adaptMin =  0.5;
    let   adaptMax = -0.5;

    const statusDot   = document.getElementById("status-dot");
    const statusText  = document.getElementById("status-text");
    const valEl       = document.getElementById("val");
    const spsEl       = document.getElementById("sps");
    const fish        = document.getElementById("fish");
    const canvas      = document.getElementById("wave");
    const ctx         = canvas.getContext("2d");
    const streamSelect = document.getElementById("stream-select");

    function setStatus(cls, text) {
      statusDot.className    = cls;
      statusText.textContent = text;
    }

    let lastTick = performance.now();
    setInterval(() => {
      const elapsed = performance.now() - lastTick;
      lastTick = performance.now();
      spsEl.textContent = (sampleCount / elapsed * 1000).toFixed(0);
      sampleCount = 0;
    }, 1000);

    function draw() {
      const w = canvas.width  = canvas.offsetWidth;
      const h = canvas.height = canvas.offsetHeight;
      ctx.clearRect(0, 0, w, h);

      // find true min/max of current buffer
      let bufMin = Infinity, bufMax = -Infinity;
      for (let i = 0; i < HISTORY_LEN; i++) {
        if (history[i] < bufMin) bufMin = history[i];
        if (history[i] > bufMax) bufMax = history[i];
      }
      // expand immediately, shrink very slowly
      if (bufMin < adaptMin) adaptMin = bufMin;
      else                   adaptMin += (bufMin - adaptMin) * SHRINK_RATE;
      if (bufMax > adaptMax) adaptMax = bufMax;
      else                   adaptMax -= (adaptMax - bufMax) * SHRINK_RATE;

      const min   = adaptMin;
      const range = (adaptMax - adaptMin) || 1;
      const pad    = PADDING * h;
      const usable = h - pad * 2;

      ctx.shadowColor = "rgba(255,255,255,0.6)";
      ctx.shadowBlur  = 8;
      ctx.beginPath();
      ctx.strokeStyle = "rgba(255,255,255,0.75)";
      ctx.lineWidth   = 2.5;
      ctx.lineJoin    = "round";
      ctx.lineCap     = "round";

      const traceEnd = w * (2 / 3);
      for (let i = 0; i < HISTORY_LEN; i++) {
        const idx  = (histIdx + i) % HISTORY_LEN;
        const x    = (i / (HISTORY_LEN - 1)) * traceEnd;
        const norm = (history[idx] - min) / range;
        const y    = h - pad - norm * usable;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // snap fish to the live tip of the trace
      const latestNorm = (history[(histIdx + HISTORY_LEN - 1) % HISTORY_LEN] - min) / range;
      const targetY = h - pad - latestNorm * usable;
      fish.style.setProperty("--fish-y", targetY.toFixed(2) + "px");

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // ── stream selector state ─────────────────────────────────────────────
    let ws                = null;
    let selectedStream    = null;   // name string or null
    let streamConnected   = false;
    let currentStreams     = [];    // latest list from server

    function sendMsg(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj));
      }
    }

    function rebuildDropdown() {
      const prev = streamSelect.value;
      streamSelect.innerHTML = "";

      const onlineNames = new Set(currentStreams.map(s => s.name));
      const isOffline   = selectedStream && !streamConnected;

      // If selected stream is currently offline, show it first with a badge
      if (isOffline) {
        const opt = document.createElement("option");
        opt.value              = selectedStream;
        opt.textContent        = selectedStream + " (offline)";
        opt.dataset.offline    = "true";
        streamSelect.appendChild(opt);
      }

      // Add all discovered streams (skip if already shown as offline above)
      for (const s of currentStreams) {
        if (isOffline && s.name === selectedStream) continue;
        const opt = document.createElement("option");
        opt.value       = s.name;
        opt.textContent = s.name;
        streamSelect.appendChild(opt);
      }

      // Fallback: no entries at all
      if (streamSelect.options.length === 0) {
        const opt = document.createElement("option");
        opt.value    = "";
        opt.disabled = true;
        opt.textContent = "no streams found";
        streamSelect.appendChild(opt);
        streamSelect.value = "";
        return;
      }

      if (selectedStream) {
        streamSelect.value = selectedStream;
      } else if (currentStreams.length > 0) {
        // Auto-select first available stream
        const first = currentStreams[0].name;
        streamSelect.value = first;
        selectedStream = first;
        sendMsg({ type: "select_stream", name: first });
      }
    }

    streamSelect.addEventListener("change", () => {
      const name = streamSelect.value;
      if (name) {
        selectedStream  = name;
        streamConnected = false;
        rebuildDropdown();
        sendMsg({ type: "select_stream", name });
      }
    });

    // ── websocket ─────────────────────────────────────────────────────────
    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => setStatus("searching", "waiting for stream…");

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);

        if (msg.type === "streams") {
          currentStreams = msg.streams;
          rebuildDropdown();

        } else if (msg.type === "sample") {
          history[histIdx] = msg.value;
          histIdx = (histIdx + 1) % HISTORY_LEN;
          sampleCount++;
          valEl.textContent = msg.value.toFixed(3);

        } else if (msg.type === "connected") {
          streamConnected = true;
          selectedStream  = msg.stream.name;
          rebuildDropdown();
          setStatus("connected", msg.stream.name);

        } else if (msg.type === "disconnected") {
          streamConnected = false;
          rebuildDropdown();
          setStatus("disconnected", "stream lost…");
          valEl.textContent = "—";

        } else if (msg.type === "searching") {
          setStatus("searching", "searching…");
        }
      };

      ws.onclose = () => {
        streamConnected = false;
        rebuildDropdown();
        setStatus("disconnected", "reconnecting…");
        setTimeout(connect, 3000);
      };
    }

    connect();
  </script>
</body>
</html>
