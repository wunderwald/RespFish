<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LSL Bridge — Test Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #0f1117;
      color: #e0e0e0;
      padding: 24px;
    }
    h1 { color: #7eb8f7; margin-bottom: 16px; font-size: 1.1rem; }

    #status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.8rem;
      margin-bottom: 20px;
      background: #2a2a2a;
      color: #888;
    }
    #status.connected    { background: #1a3a2a; color: #4caf7d; }
    #status.disconnected { background: #3a1a1a; color: #e06060; }
    #status.searching    { background: #2a2a1a; color: #d4a843; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: #1a1d26;
      border: 1px solid #2a2d36;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .card .label { font-size: 0.7rem; color: #666; margin-bottom: 4px; }
    .card .value { font-size: 1.4rem; color: #fff; }
    .card .value.bpm  { color: #7eb8f7; }
    .card .value.rate { color: #4caf7d; }

    canvas {
      display: block;
      width: 100%;
      height: 120px;
      background: #1a1d26;
      border: 1px solid #2a2d36;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    #log {
      background: #1a1d26;
      border: 1px solid #2a2d36;
      border-radius: 8px;
      padding: 12px;
      height: 180px;
      overflow-y: auto;
      font-size: 0.75rem;
      line-height: 1.6;
    }
    .log-sample      { color: #888; }
    .log-connected   { color: #4caf7d; }
    .log-disconnected{ color: #e06060; }
    .log-searching   { color: #d4a843; }
    .log-error       { color: #f07070; }
  </style>
</head>
<body>
  <h1>LSL → WebSocket Bridge — Test Client</h1>
  <div id="status">Connecting…</div>

  <div class="grid">
    <div class="card">
      <div class="label">Raw value</div>
      <div class="value" id="val">—</div>
    </div>
    <div class="card">
      <div class="label">Breath rate</div>
      <div class="value bpm" id="bpm">—</div>
    </div>
    <div class="card">
      <div class="label">Samples / sec</div>
      <div class="value rate" id="sps">—</div>
    </div>
  </div>

  <canvas id="wave"></canvas>

  <div id="log"></div>

  <script>
    // ── config ────────────────────────────────────────────────────────────
    const WS_URL      = "ws://localhost:8765";
    const HISTORY_LEN = 300;   // samples to draw on the canvas

    // ── state ─────────────────────────────────────────────────────────────
    const history = new Float32Array(HISTORY_LEN);
    let   histIdx = 0;
    let   sampleCount = 0;

    // ── DOM refs ──────────────────────────────────────────────────────────
    const statusEl = document.getElementById("status");
    const valEl    = document.getElementById("val");
    const bpmEl    = document.getElementById("bpm");
    const spsEl    = document.getElementById("sps");
    const logEl    = document.getElementById("log");
    const canvas   = document.getElementById("wave");
    const ctx      = canvas.getContext("2d");

    // ── logging ───────────────────────────────────────────────────────────
    function addLog(text, cls = "") {
      const line = document.createElement("div");
      line.textContent = `[${new Date().toISOString().slice(11,23)}] ${text}`;
      if (cls) line.className = cls;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // ── canvas draw ───────────────────────────────────────────────────────
    function drawWave() {
      const w = canvas.width  = canvas.offsetWidth;
      const h = canvas.height = canvas.offsetHeight;
      ctx.clearRect(0, 0, w, h);

      let min = Infinity, max = -Infinity;
      for (let i = 0; i < HISTORY_LEN; i++) {
        if (history[i] < min) min = history[i];
        if (history[i] > max) max = history[i];
      }
      const range = max - min || 1;

      ctx.beginPath();
      ctx.strokeStyle = "#7eb8f7";
      ctx.lineWidth   = 1.5;

      for (let i = 0; i < HISTORY_LEN; i++) {
        const idx = (histIdx + i) % HISTORY_LEN;
        const x = (i / (HISTORY_LEN - 1)) * w;
        const y = h - ((history[idx] - min) / range) * h * 0.85 - h * 0.075;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      requestAnimationFrame(drawWave);
    }
    requestAnimationFrame(drawWave);

    // ── samples/sec counter ───────────────────────────────────────────────
    setInterval(() => {
      spsEl.textContent = sampleCount;
      sampleCount = 0;
    }, 1000);

    // ── WebSocket ─────────────────────────────────────────────────────────
    function connect() {
      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        statusEl.textContent = "Socket open — waiting for stream…";
        statusEl.className   = "searching";
        addLog("WebSocket opened", "log-connected");
      };

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);

        if (msg.type === "sample") {
          history[histIdx] = msg.value;
          histIdx = (histIdx + 1) % HISTORY_LEN;
          sampleCount++;
          valEl.textContent = msg.value.toFixed(4);
          if (msg.breath_rate !== null)
            bpmEl.textContent = msg.breath_rate.toFixed(1) + " bpm";

        } else if (msg.type === "connected") {
          const s = msg.stream;
          statusEl.textContent = `Connected — ${s.name}  (${s.sample_rate} Hz, ${s.channel_count} ch)`;
          statusEl.className   = "connected";
          addLog(`Stream connected: ${JSON.stringify(s)}`, "log-connected");

        } else if (msg.type === "disconnected") {
          statusEl.textContent = "Stream disconnected — waiting…";
          statusEl.className   = "disconnected";
          bpmEl.textContent    = "—";
          addLog(`Disconnected: ${msg.reason}`, "log-disconnected");

        } else if (msg.type === "searching") {
          statusEl.textContent = `Searching for '${msg.stream_name}'…`;
          statusEl.className   = "searching";
          addLog(`Searching for LSL stream: ${msg.stream_name}`, "log-searching");

        } else if (msg.type === "error") {
          addLog(`Error: ${msg.message}`, "log-error");
        }
      };

      ws.onerror = (e) => {
        addLog("WebSocket error", "log-error");
      };

      ws.onclose = () => {
        statusEl.textContent = "Socket closed — reconnecting…";
        statusEl.className   = "disconnected";
        addLog("WebSocket closed — retrying in 3 s…", "log-disconnected");
        setTimeout(connect, 3000);
      };
    }

    connect();
  </script>
</body>
</html>
